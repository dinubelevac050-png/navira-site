<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Navira Tiles & Bathrooms</title>
<meta name="description" content="Browse tiles, bathrooms and wood flooring at Navira Tiles & Bathrooms." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css" />
</head>

<body>

<header class="header">
  <div class="container header__inner">
    <a class="brand" href="./index.html">
      <img class="brand__logo" src="./photo_2026-02-25 21.37.49.jpeg" alt="Navira logo">
      <div class="brand__text">
        <span class="brand__name">Navira Tiles &amp; Bathrooms</span>
        <span class="brand__tagline">Quality you can trust, Style you'll love</span>
      </div>
    </a>
  </div>
</header>

<main>

<section class="section section--alt">
  <div class="container">
    <h1 id="catTitle">Category</h1>
    <p class="muted" id="catDesc">Browse our collection.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div id="categoryContent"></div>
  </div>
</section>

</main>

<footer class="footer">
  <div class="container footer__inner">
    <strong>Navira Tiles &amp; Bathrooms</strong>
  </div>
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const cat = params.get("cat");
const sub = params.get("sub");

const title = document.getElementById("catTitle");
const desc  = document.getElementById("catDesc");
const content = document.getElementById("categoryContent");

/* ========= HELPERS ========= */
function titleCaseFromSlug(slug){
  return (slug || "")
    .replaceAll("-", " ")
    .replace(/\b\w/g, c => c.toUpperCase());
}

/* Build safe URLs (fixes desktop "View all" issues) */
function buildUrl(catValue, subValue = null){
  const u = new URL("./category.html", window.location.href);
  u.searchParams.set("cat", catValue);
  if(subValue){
    u.searchParams.set("sub", subValue);
  } else {
    u.searchParams.delete("sub");
  }
  return u.toString();
}

function catNavHtml(baseCat, orderArr, namesMap, currentSub){
  const idx = orderArr.indexOf(currentSub);
  const prevSub = idx > 0 ? orderArr[idx - 1] : null;
  const nextSub = (idx >= 0 && idx < orderArr.length - 1) ? orderArr[idx + 1] : null;

  const prevLabel = prevSub ? (namesMap[prevSub] || titleCaseFromSlug(prevSub)) : "";
  const nextLabel = nextSub ? (namesMap[nextSub] || titleCaseFromSlug(nextSub)) : "";

  return `
    <div class="catNav">
      ${prevSub
        ? `<a class="btn btn--soft" href="${buildUrl(baseCat, prevSub)}">← ${prevLabel}</a>`
        : `<span></span>`
      }

      <a class="btn btn--ghost" href="${buildUrl(baseCat)}">View all</a>

      ${nextSub
        ? `<a class="btn btn--primary" href="${buildUrl(baseCat, nextSub)}">Next: ${nextLabel} →</a>`
        : `<span></span>`
      }
    </div>
  `;
}

function gridCard(cardCat, name, img, subSlug){
  return `
    <a class="tile tile--withImg" href="${buildUrl(cardCat, subSlug)}">
      <img class="tile__img" src="./${img}" alt="${name}">
      <div class="tile__body">
        <h3>${name}</h3>
        <span class="tile__meta">View →</span>
      </div>
    </a>
  `;
}

/* ========= DATA ========= */

/* Tiles */
const tilesOrder = [
  "bathroom-tiles",
  "kitchen-tiles",
  "mosaic-tiles",
  "floor-tiles",
  "wall-tiles",
  "natural-stone",
  "outdoor-tiles",
  "wood-effect-tiles"
];

const tilesNames = {
  "bathroom-tiles": "Bathroom Tiles",
  "kitchen-tiles": "Kitchen Tiles",
  "mosaic-tiles": "Mosaic Tiles",
  "floor-tiles": "Floor Tiles",
  "wall-tiles": "Wall Tiles",
  "natural-stone": "Natural Stone",
  "outdoor-tiles": "Outdoor Tiles",
  "wood-effect-tiles": "Wood Effect Tiles"
};

const tilesImages = {
  "bathroom-tiles": "bathroom.tiles.jpg",
  "kitchen-tiles": "kitchen.tiles.jpg",
  "mosaic-tiles": "mosaic.tiles.jpg",
  "floor-tiles": "floor.tiles.jpg",
  "wall-tiles": "wall.tiles.jpg",
  "natural-stone": "naturalstone.tiles.jpg",
  "outdoor-tiles": "outdoor.tiles.jpg",
  "wood-effect-tiles": "woodeffect.tiles.jpg"
};

/* Bathrooms */
const bathroomsOrder = [
  "toilets",
  "showers-wetrooms",
  "baths",
  "towel-rails-heating",
  "mirrors-cabinets",
  "units-basins",
  "shower-valves-taps"
];

const bathroomsNames = {
  "toilets": "Toilets",
  "showers-wetrooms": "Showers & Wetrooms",
  "baths": "Baths",
  "towel-rails-heating": "Towel Rails & Heating",
  "mirrors-cabinets": "Mirrors & Cabinets",
  "units-basins": "Units & Basins",
  "shower-valves-taps": "Shower Valves & Taps"
};

const bathroomsImages = {
  "toilets": "toilets.jpg",
  "showers-wetrooms": "showerswetroom.jpg",
  "baths": "baths.jpg",
  "towel-rails-heating": "towelrailsheating.jpg",
  "mirrors-cabinets": "mirrorscabinets.jpg",
  "units-basins": "unitsbasins.jpg",
  "shower-valves-taps": "showervalvestaps.jpg"
};

/* Wood Flooring */
const woodOrder = [
  "laminate-flooring",
  "engineered-wood",
  "oak-finishes",
  "herringbone",
  "grey-tones"
];

const woodNames = {
  "laminate-flooring": "Laminate Flooring",
  "engineered-wood": "Engineered Wood",
  "oak-finishes": "Oak Finishes",
  "herringbone": "Herringbone Style",
  "grey-tones": "Grey & Modern Tones"
};

const woodGridImages = {
  "laminate-flooring": "woodflooring-laminate.jpg",
  "engineered-wood": "woodflooring-engineered.jpg",
  "oak-finishes": "woodflooring-oak.jpg",
  "herringbone": "woodflooring-herringbone.jpg",
  "grey-tones": "woodflooring-grey.jpg"
};

/* ========= ROUTES ========= */

/* 1) Tiles main */
if(cat === "tiles" && !sub){
  title.innerText = "Tiles";
  desc.innerText = "Explore our full tile collection.";

  content.innerHTML = `
    <div class="grid">
      ${gridCard("tiles", tilesNames["bathroom-tiles"], tilesImages["bathroom-tiles"], "bathroom-tiles")}
      ${gridCard("tiles", tilesNames["kitchen-tiles"], tilesImages["kitchen-tiles"], "kitchen-tiles")}
      ${gridCard("tiles", tilesNames["mosaic-tiles"], tilesImages["mosaic-tiles"], "mosaic-tiles")}
      ${gridCard("tiles", tilesNames["floor-tiles"], tilesImages["floor-tiles"], "floor-tiles")}
      ${gridCard("tiles", tilesNames["wall-tiles"], tilesImages["wall-tiles"], "wall-tiles")}
      ${gridCard("tiles", tilesNames["natural-stone"], tilesImages["natural-stone"], "natural-stone")}
      ${gridCard("tiles", tilesNames["outdoor-tiles"], tilesImages["outdoor-tiles"], "outdoor-tiles")}
      ${gridCard("tiles", tilesNames["wood-effect-tiles"], tilesImages["wood-effect-tiles"], "wood-effect-tiles")}
    </div>
  `;
}

/* 2) Tiles subpage */
else if(cat === "tiles" && sub){
  const pretty = tilesNames[sub] || titleCaseFromSlug(sub);
  const img = tilesImages[sub] || "tiles.jpg";

  title.innerText = pretty;
  desc.innerText = "Premium quality tiles available in-store. Visit us or call for availability.";

  content.innerHTML = `
    <img class="catHeroImg" src="./${img}" alt="${pretty}">
    <p class="muted">Large format • Small format • Matt • Gloss • Various finishes available.</p>

    ${catNavHtml("tiles", tilesOrder, tilesNames, sub)}

    <div class="card" style="margin-top:20px;">
      <h3>Need pricing or stock info?</h3>
      <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;">
        <a class="btn btn--primary" href="tel:0874274447">Call Now</a>
        <a class="btn btn--soft" href="mailto:info@naviratiles.com">Request Quote</a>
      </div>
    </div>
  `;
}

/* 3) Bathrooms main */
else if(cat === "bathrooms" && !sub){
  title.innerText = "Bathrooms";
  desc.innerText = "Complete bathroom solutions for modern and classic interiors.";

  content.innerHTML = `
    <div class="grid">
      ${gridCard("bathrooms", bathroomsNames["toilets"], bathroomsImages["toilets"], "toilets")}
      ${gridCard("bathrooms", bathroomsNames["showers-wetrooms"], bathroomsImages["showers-wetrooms"], "showers-wetrooms")}
      ${gridCard("bathrooms", bathroomsNames["baths"], bathroomsImages["baths"], "baths")}
      ${gridCard("bathrooms", bathroomsNames["towel-rails-heating"], bathroomsImages["towel-rails-heating"], "towel-rails-heating")}
      ${gridCard("bathrooms", bathroomsNames["mirrors-cabinets"], bathroomsImages["mirrors-cabinets"], "mirrors-cabinets")}
      ${gridCard("bathrooms", bathroomsNames["units-basins"], bathroomsImages["units-basins"], "units-basins")}
      ${gridCard("bathrooms", bathroomsNames["shower-valves-taps"], bathroomsImages["shower-valves-taps"], "shower-valves-taps")}
    </div>
  `;
}

/* 4) Bathrooms subpage */
else if(cat === "bathrooms" && sub){
  const pretty = bathroomsNames[sub] || titleCaseFromSlug(sub);
  const img = bathroomsImages[sub] || "bathroom.jpg";

  title.innerText = pretty;
  desc.innerText = "Bathroom products available in-store. Call or email for availability.";

  content.innerHTML = `
    <img class="catHeroImg" src="./${img}" alt="${pretty}">
    <p class="muted">Quality brands • Modern & classic • Showroom support available.</p>

    ${catNavHtml("bathrooms", bathroomsOrder, bathroomsNames, sub)}

    <div class="card" style="margin-top:20px;">
      <h3>Need pricing or stock info?</h3>
      <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;">
        <a class="btn btn--primary" href="tel:0874274447">Call Now</a>
        <a class="btn btn--soft" href="mailto:info@naviratiles.com">Request Quote</a>
      </div>
    </div>
  `;
}

/* 5) Wood Flooring main */
else if(cat === "wood-flooring" && !sub){
  title.innerText = "Wood Flooring";
  desc.innerText = "Premium laminate and engineered wood flooring solutions.";

  content.innerHTML = `
    <div class="grid">
      ${gridCard("wood-flooring", woodNames["laminate-flooring"], woodGridImages["laminate-flooring"], "laminate-flooring")}
      ${gridCard("wood-flooring", woodNames["engineered-wood"], woodGridImages["engineered-wood"], "engineered-wood")}
      ${gridCard("wood-flooring", woodNames["oak-finishes"], woodGridImages["oak-finishes"], "oak-finishes")}
      ${gridCard("wood-flooring", woodNames["herringbone"], woodGridImages["herringbone"], "herringbone")}
      ${gridCard("wood-flooring", woodNames["grey-tones"], woodGridImages["grey-tones"], "grey-tones")}
    </div>
  `;
}

/* 6) Wood Flooring subpage */
else if(cat === "wood-flooring" && sub){
  const pretty = woodNames[sub] || titleCaseFromSlug(sub);
const img = woodGridImages[sub] || "woodflooring-laminate.jpg";

  title.innerText = pretty;
  desc.innerText = "High quality wood flooring available in-store. Call for availability.";

  content.innerHTML = `
    <img class="catHeroImg" src="./${img}" alt="${pretty}">
    <p class="muted">Durable • Easy maintenance • Modern & classic finishes available.</p>

    ${catNavHtml("wood-flooring", woodOrder, woodNames, sub)}

    <div class="card" style="margin-top:20px;">
      <h3>Need pricing or stock info?</h3>
      <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;">
        <a class="btn btn--primary" href="tel:0874274447">Call Now</a>
        <a class="btn btn--soft" href="mailto:info@naviratiles.com">Request Quote</a>
      </div>
    </div>
  `;
}

/* 7) Fallback */
else {
  title.innerText = "Categories";
  desc.innerText = "Choose a category to browse.";

  content.innerHTML = `
    <div class="grid">
      <a class="tile" href="${buildUrl('tiles')}">
        <h3>Tiles</h3>
        <p>Browse tile categories.</p>
        <span class="tile__meta">Open →</span>
      </a>
      <a class="tile" href="${buildUrl('bathrooms')}">
        <h3>Bathrooms</h3>
        <p>Bathroom products &amp; ranges.</p>
        <span class="tile__meta">Open →</span>
      </a>
      <a class="tile" href="${buildUrl('wood-flooring')}">
        <h3>Wood Flooring</h3>
        <p>Flooring styles &amp; finishes.</p>
        <span class="tile__meta">Open →</span>
      </a>
    </div>
  `;
}
</script>

</body>
</html>
